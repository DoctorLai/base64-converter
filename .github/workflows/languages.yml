name: Language Badge

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  javascript-percentage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute JavaScript percentage and write badge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          langs=$(gh api "repos/${{ github.repository }}/languages")
          total=$(echo "$langs" | jq '[.[]] | add // 0')
          if [ "$total" -eq 0 ]; then
            echo "No language data returned; skipping."
            exit 0
          fi
          js=$(echo "$langs" | jq '((.JavaScript // 0) + (.TypeScript // 0))')
          pct=$(awk "BEGIN { printf \"%.1f\", ($js / $total) * 100 }")
          color=$(awk "BEGIN { print ($pct >= 90) ? \"brightgreen\" : (($pct >= 70) ? \"green\" : \"yellow\") }")
          echo "JavaScript: ${pct}% (color ${color})"
          mkdir -p badges
          jq -n --arg msg "${pct}%" --arg color "$color" \
            '{schemaVersion: 1, label: "JavaScript", message: $msg, color: $color}' \
            > badges/javascript.json
          cat badges/javascript.json

      - name: Commit and push if changed
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add badges/javascript.json
          if git diff --cached --quiet; then
            echo "Badge unchanged."
          else
            git commit -m "chore: update JavaScript percentage badge [skip ci]"
            git push
          fi
