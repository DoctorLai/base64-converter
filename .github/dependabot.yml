version: 2
updates:
  # Keep npm dependencies up to date.
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
    open-pull-requests-limit: 10
    labels:
      - 'dependencies'
    commit-message:
      prefix: 'chore(deps)'
      prefix-development: 'chore(dev-deps)'
    groups:
      # Group minor and patch updates to reduce PR noise.
      minor-and-patch:
        update-types:
          - 'minor'
          - 'patch'

  # Keep GitHub Actions up to date.
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
    labels:
      - 'dependencies'
      - 'github-actions'
    commit-message:
      prefix: 'chore(ci)'
